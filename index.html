
<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<meta
name="theme-color"
content="#27ae60">

<title>Fashion AI Lens</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
padding:0;
font-family:sans-serif;
background:#f4f7fa;
color:#333;
padding-bottom:120px;
}

.container{
max-width:920px;
margin:auto;
padding:16px;
}

.card{
background:#fff;
border-radius:18px;
padding:18px;
margin-top:16px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

h1{
margin:0;
font-size:30px;
}

h2{
margin-top:0;
font-size:22px;
border-left:6px solid #27ae60;
padding-left:10px;
}

.step{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button,
input{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:14px;
font-size:16px;
}

input{
border:1px solid #ccc;
}

button{
font-weight:bold;
cursor:pointer;
color:#fff;
}

.capture-btn{
background:#8e44ad;
}

.search-btn{
background:#27ae60;
}

.ai-btn{
background:#3498db;
}

.save-btn{
background:#e67e22;
}

.clear-btn{
background:#e74c3c;
}

.preview{
width:100%;
border-radius:16px;
margin-top:16px;
display:none;
}

.result{
margin-top:18px;
padding:18px;
border-radius:16px;
line-height:1.8;
white-space:pre-wrap;
overflow-wrap:break-word;
background:#fff;
}

.good{
border-left:8px solid #27ae60;
}

.bad{
border-left:8px solid #e74c3c;
}

.ai{
border-left:8px solid #3498db;
background:#eef7ff;
}

.link-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.link-btn{
display:block;
padding:12px;
background:#34495e;
color:#fff;
text-decoration:none;
text-align:center;
border-radius:10px;
font-weight:bold;
}

#reader{
margin-top:15px;
border-radius:16px;
overflow:hidden;
}

.history-item{
padding:12px;
border-bottom:1px solid #ddd;
}

.camera-float{
position:fixed;
right:25px;
bottom:25px;
width:74px;
height:74px;
border-radius:50%;
background:#27ae60;
border:none;
color:#fff;
font-size:32px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
z-index:999;
}

.loading{
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.5;}
100%{opacity:1;}
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Fashion AI Lens</h1>

<p>
画像から商品を特定して保存
</p>

</div>

<!-- STEP1 -->

<div class="card">

<h2>STEP1：入力</h2>

<div class="step">

📷 撮影 / 🖼 画像選択 / 📦 バーコード

</div>

<input
type="text"
id="searchInput"
placeholder="ブランド・型番・商品名">

<div class="grid">

<button
class="capture-btn"
onclick="captureCamera()">

📷 今撮る

</button>

<button
class="capture-btn"
onclick="pickImage()">

🖼 保存画像

</button>

</div>

<div class="grid">

<button
class="capture-btn"
onclick="startBarcodeScanner()">

📦 バーコード

</button>

<button
class="search-btn"
onclick="normalSearch()">

🔎 EC検索

</button>

</div>

<input
type="file"
id="imageInput"
accept="image/*"
style="display:none;">

<div id="reader"></div>

<img
id="preview"
class="preview">

</div>

<!-- STEP2 -->

<div class="card">

<h2>STEP2：解析</h2>

<div class="step">

AI + OCRで商品を特定

</div>

<button
class="ai-btn"
onclick="analyzeProduct()">

🧠 商品解析スタート

</button>

</div>

<!-- STEP3 -->

<div class="card">

<h2>STEP3：結果</h2>

<div
id="result"
class="result good">

待機中...

</div>

<div class="grid">

<button
class="save-btn"
onclick="saveHistory()">

⭐ 保存

</button>

<button
class="clear-btn"
onclick="clearAll()">

🗑 クリア

</button>

</div>

</div>

<!-- HISTORY -->

<div class="card">

<h2>履歴</h2>

<div id="historyArea">

履歴なし

</div>

<button
class="clear-btn"
onclick="clearHistory()">

🧹 履歴削除

</button>

</div>

</div>

<button
class="camera-float"
onclick="captureCamera()">

📷

</button>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://unpkg.com/tesseract.js@4/dist/tesseract.min.js"></script>

<script>

const WORKER_URL =
"https://chanfana-openapi-template.big-light-0903.workers.dev";

let currentScanner = null;

// ======================================
// UI
// ======================================

function showLoading(text){

const result =
document.getElementById("result");

result.className =
"result good loading";

result.innerHTML = text;

}

function showError(text){

const result =
document.getElementById("result");

result.className =
"result bad";

result.innerHTML = text;

}

function showAI(text){

const result =
document.getElementById("result");

result.className =
"result ai";

result.innerHTML =
text.replace(/\n/g,"<br>");

}

function showResult(html){

const result =
document.getElementById("result");

result.className =
"result good";

result.innerHTML = html;

}

// ======================================
// Camera
// ======================================

window.captureCamera = function(){

const input =
document.getElementById("imageInput");

input.value = "";

input.setAttribute(
"capture",
"environment"
);

input.click();

}

// ======================================
// Pick Image
// ======================================

window.pickImage = function(){

const input =
document.getElementById("imageInput");

input.value = "";

input.removeAttribute("capture");

input.click();

}

// ======================================
// Preview
// ======================================

document
.getElementById("imageInput")
.addEventListener(
"change",
(e)=>{

const file =
e.target.files?.[0];

if(!file) return;

const preview =
document.getElementById("preview");

preview.src =
URL.createObjectURL(file);

preview.style.display =
"block";

showLoading(
"画像読み込み完了"
);

}
);

// ======================================
// Barcode
// ======================================

window.startBarcodeScanner =
async function(){

try{

clearReader();

if(currentScanner){

try{
await currentScanner.stop();
await currentScanner.clear();
}catch(e){}

}

const scanner =
new Html5Qrcode("reader");

currentScanner = scanner;

await scanner.start(

{
facingMode:"environment"
},

{
fps:10,
qrbox:{
width:240,
height:240
}
},

async(decodedText)=>{

try{
await scanner.stop();
await scanner.clear();
}catch(e){}

clearReader();

document
.getElementById("searchInput")
.value = decodedText;

showLoading(
"バーコード取得完了"
);

normalSearch();

}

);

}catch(err){

showError(
"バーコード起動失敗"
);

}

}

// ======================================
// OCR
// ======================================

async function runOCR(){

const file =
document.getElementById("imageInput")
.files?.[0];

if(!file){

return "";

}

try{

const worker =
await Tesseract.createWorker();

await worker.loadLanguage(
"jpn+eng"
);

await worker.initialize(
"jpn+eng"
);

const result =
await worker.recognize(file);

await worker.terminate();

return result.data.text;

}catch(err){

console.log(err);

return "";

}

}

// ======================================
// Gemini
// ======================================

async function askGemini(
prompt,
base64,
mimeType
){

const response =
await fetch(
WORKER_URL,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[
{
parts:[

{
text:prompt
},

{
inlineData:{
mimeType:mimeType,
data:base64
}
}

]
}
]

})

}
);

const data =
await response.json();

if(data.error){

throw new Error(
data.error
);

}

const text =
data?.candidates?.[0]
?.content?.parts?.[0]
?.text;

if(!text){

throw new Error(
"AI応答なし"
);

}

return text;

}

// ======================================
// Compress
// ======================================

async function compressImage(file){

return new Promise((resolve)=>{

const img = new Image();

const reader = new FileReader();

reader.onload = e=>{

img.src = e.target.result;

};

img.onload = ()=>{

const canvas =
document.createElement("canvas");

const max = 900;

let width = img.width;
let height = img.height;

if(width > height){

if(width > max){

height *= max / width;
width = max;

}

}else{

if(height > max){

width *= max / height;
height = max;

}

}

canvas.width = width;
canvas.height = height;

const ctx =
canvas.getContext("2d");

ctx.drawImage(
img,
0,
0,
width,
height
);

resolve(

canvas.toDataURL(
"image/jpeg",
0.55
)

);

};

reader.readAsDataURL(file);

});

}

// ======================================
// Analyze
// ======================================

window.analyzeProduct =
async function(){

const file =
document.getElementById("imageInput")
.files?.[0];

if(!file){

alert("画像なし");

return;

}

showLoading(
"商品解析中..."
);

try{

// OCR

const ocrText =
await runOCR();

// Compress

const compressed =
await compressImage(file);

const base64 =
compressed.split(",")[1];

// AI

const prompt = `

あなたはファッション商品解析AI。

画像を解析して
商品を特定してください。

OCR結果：

${ocrText}

以下を出力：

・ブランド候補
・商品名候補
・型番候補
・カテゴリ
・特徴
・推定価格
・検索向けキーワード

最後に：

【検索用ワード】

を必ず出力。

`;

const aiResult =
await askGemini(
prompt,
base64,
"image/jpeg"
);

document
.getElementById("searchInput")
.value =
extractSearchWord(aiResult);

showAI(aiResult);

appendECLinks();

}catch(err){

showError(
"解析失敗：" + err.message
);

console.error(err);

}

}

// ======================================
// Extract
// ======================================

function extractSearchWord(text){

const match =
text.match(
/【検索用ワード】[:：]?\s*(.+)/i
);

if(match){

return match[1]
.trim();

}

return "";

}

// ======================================
// EC
// ======================================

function appendECLinks(){

const keyword =
document
.getElementById("searchInput")
.value
.trim();

if(!keyword) return;

const q =
encodeURIComponent(keyword);

document
.getElementById("result")
.innerHTML += `

<div class="link-grid">

<a
class="link-btn"
target="_blank"
href="https://www.google.com/search?q=site:zozo.jp+${q}">
ZOZO
</a>

<a
class="link-btn"
target="_blank"
href="https://www.google.com/search?q=site:buyma.com+${q}">
BUYMA
</a>

<a
class="link-btn"
target="_blank"
href="https://www.google.com/search?q=site:jp.mercari.com+${q}">
メルカリ
</a>

<a
class="link-btn"
target="_blank"
href="https://www.google.com/search?q=site:rakuten.co.jp+${q}">
楽天
</a>

<a
class="link-btn"
target="_blank"
href="https://www.google.com/search?q=site:amazon.co.jp+${q}">
Amazon
</a>

<a
class="link-btn"
target="_blank"
href="https://www.google.com/search?q=${q}">
Google
</a>

</div>

`;

}

// ======================================
// Search
// ======================================

window.normalSearch = function(){

appendECLinks();

}

// ======================================
// Save
// ======================================

window.saveHistory = function(){

const text =
document
.getElementById("result")
.innerText;

if(
text === "待機中..."
){

alert("保存内容なし");

return;

}

const history =
JSON.parse(
localStorage.getItem(
"fashion_history"
) || "[]"
);

history.unshift({

date:new Date()
.toLocaleString(),

text:text

});

localStorage.setItem(
"fashion_history",
JSON.stringify(history)
);

loadHistory();

alert("保存完了");

}

// ======================================
// Load
// ======================================

window.loadHistory = function(){

const history =
JSON.parse(
localStorage.getItem(
"fashion_history"
) || "[]"
);

const area =
document.getElementById(
"historyArea"
);

if(!history.length){

area.innerHTML =
"履歴なし";

return;

}

area.innerHTML =
history.map(item=>`

<div class="history-item">

<b>${item.date}</b>

<p>
${item.text.substring(0,180)}
</p>

</div>

`).join("");

}

// ======================================
// Clear History
// ======================================

window.clearHistory = function(){

localStorage.removeItem(
"fashion_history"
);

loadHistory();

}

// ======================================
// Clear
// ======================================

window.clearAll =
async function(){

document
.getElementById("searchInput")
.value = "";

document
.getElementById("result")
.innerHTML = "待機中...";

document
.getElementById("result")
.className = "result good";

const preview =
document.getElementById("preview");

preview.src = "";

preview.style.display =
"none";

const input =
document.getElementById("imageInput");

input.value = "";

clearReader();

if(currentScanner){

try{

await currentScanner.stop();
await currentScanner.clear();

}catch(e){}

currentScanner = null;

}

}

// ======================================
// Reader
// ======================================

function clearReader(){

document
.getElementById("reader")
.innerHTML = "";

}

// ======================================
// Init
// ======================================

loadHistory();

</script>

</body>
</html>
