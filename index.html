<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Fashion AI OS</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
padding:0;
background:#f5f7fa;
font-family:sans-serif;
color:#333;
padding-bottom:120px;
}

.container{
max-width:900px;
margin:auto;
padding:16px;
}

.card{
background:#fff;
border-radius:18px;
padding:18px;
margin-top:16px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

h1{
margin:0;
font-size:28px;
color:#2c3e50;
}

h2{
margin-top:0;
font-size:20px;
border-left:6px solid #27ae60;
padding-left:10px;
}

input,
button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:14px;
font-size:16px;
}

input{
border:1px solid #ccc;
}

button{
font-weight:bold;
cursor:pointer;
color:#fff;
}

button:disabled{
opacity:0.45;
cursor:not-allowed;
}

.capture-btn{
background:#8e44ad;
}

.ai-btn{
background:#3498db;
}

.search-btn{
background:#27ae60;
}

.save-btn{
background:#e67e22;
}

.clear-btn{
background:#e74c3c;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.preview{
width:100%;
border-radius:14px;
margin-top:14px;
display:none;
}

.result{
margin-top:18px;
padding:18px;
border-radius:14px;
line-height:1.8;
white-space:pre-wrap;
overflow-wrap:break-word;
background:#fff;
}

.good{
border-left:8px solid #27ae60;
}

.bad{
border-left:8px solid #e74c3c;
}

.ai{
border-left:8px solid #3498db;
background:#eef7ff;
}

.link-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:18px;
}

.link-btn{
display:block;
padding:12px;
text-align:center;
border-radius:10px;
background:#34495e;
color:#fff;
text-decoration:none;
font-weight:bold;
}

#reader{
margin-top:15px;
overflow:hidden;
border-radius:14px;
}

.history-item{
padding:12px;
border-bottom:1px solid #ddd;
}

.camera-float{
position:fixed;
bottom:25px;
right:25px;
width:72px;
height:72px;
border-radius:50%;
background:#27ae60;
color:#fff;
font-size:30px;
border:none;
box-shadow:0 6px 18px rgba(0,0,0,0.25);
z-index:999;
}

.step{
margin-top:8px;
font-size:14px;
color:#666;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Fashion AI OS</h1>

<p>
服・ブランド・型番解析特化
</p>

</div>

<!-- STEP1 -->

<div class="card">

<h2>STEP1：入力</h2>

<div class="step">
まず画像取得または検索ワード入力
</div>

<input
type="text"
id="searchInput"
placeholder="ブランド / 型番 / 商品名">

<div class="grid">

<button
class="capture-btn"
onclick="captureCamera()">

📷 今撮る

</button>

<button
class="capture-btn"
onclick="pickImage()">

🖼 保存済み画像

</button>

</div>

<div class="grid">

<button
class="capture-btn"
onclick="startBarcodeScanner()">

📦 バーコード読む

</button>

<button
class="search-btn"
onclick="normalSearch()">

🔎 EC検索

</button>

</div>

<input
type="file"
id="imageInput"
accept="image/*"
style="display:none;">

<div id="reader"></div>

<img
id="preview"
class="preview">

</div>

<!-- STEP2 -->

<div class="card">

<h2>STEP2：解析</h2>

<div class="step">
画像選択後に使用
</div>

<div class="grid">

<button
id="ocrBtn"
class="ai-btn"
onclick="readOCR()"
disabled>

🔤 タグ/文字を読む

</button>

<button
id="aiBtn"
class="ai-btn"
onclick="analyzeImage()"
disabled>

🧠 AIで商品特定

</button>

</div>

</div>

<!-- RESULT -->

<div class="card">

<h2>結果</h2>

<div
id="result"
class="result good">

待機中...

</div>

<div class="grid">

<button
class="save-btn"
onclick="saveHistory()">

⭐ 保存

</button>

<button
class="clear-btn"
onclick="clearAll()">

🗑 オールクリア

</button>

</div>

</div>

<!-- HISTORY -->

<div class="card">

<h2>履歴</h2>

<div id="historyArea">

履歴なし

</div>

</div>

</div>

<button
class="camera-float"
onclick="captureCamera()">

📷

</button>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>

// ======================================
// Worker URL
// ======================================

const WORKER_URL =
"https://chanfana-openapi-template.big-light-0903.workers.dev";

// ======================================
// State
// ======================================

let currentScanner = null;

// ======================================
// Gemini
// ======================================

async function askGemini(prompt, base64=null, mimeType=null){

const parts = [
{
text:prompt
}
];

if(base64){

parts.push({
inlineData:{
mimeType:mimeType,
data:base64
}
});

}

const response =
await fetch(
WORKER_URL,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[
{
parts:parts
}
],

generationConfig:{
temperature:0.7,
topP:0.95,
topK:40,
maxOutputTokens:4096
}

})

}
);

const data =
await response.json();

if(data.error){

throw new Error(
data.error.message
);

}

const text =
data?.candidates?.[0]
?.content?.parts?.[0]
?.text;

if(!text){

throw new Error(
"AI解析失敗"
);

}

return text;

}

// ======================================
// Search
// ======================================

window.normalSearch = function(){

const keyword =
document.getElementById("searchInput")
.value
.trim();

if(!keyword){

alert("検索ワード入力");

return;

}

showResult(`

<h2>${keyword}</h2>

<div class="link-grid">

<a
class="link-btn"
target="_blank"
href="https://zozo.jp/search/?p_keyv=${keyword}">
ZOZO
</a>

<a
class="link-btn"
target="_blank"
href="https://www.buyma.com/r/_${keyword}/">
BUYMA
</a>

<a
class="link-btn"
target="_blank"
href="https://jp.mercari.com/search?keyword=${keyword}">
メルカリ
</a>

<a
class="link-btn"
target="_blank"
href="https://search.rakuten.co.jp/search/mall/${keyword}/">
楽天
</a>

<a
class="link-btn"
target="_blank"
href="https://www.amazon.co.jp/s?k=${keyword}">
Amazon
</a>

<a
class="link-btn"
target="_blank"
href="https://www.google.com/search?q=${keyword}">
Google
</a>

</div>

`);

}

// ======================================
// Camera
// ======================================

window.captureCamera = function(){

const input =
document.getElementById("imageInput");

input.setAttribute(
"capture",
"environment"
);

input.click();

}

// ======================================
// Pick Image
// ======================================

window.pickImage = function(){

const oldInput =
document.getElementById("imageInput");

const newInput =
oldInput.cloneNode(true);

newInput.removeAttribute("capture");

oldInput.parentNode.replaceChild(
newInput,
oldInput
);

newInput.click();

newInput.addEventListener(
"change",
handleImagePreview
);

}

// ======================================
// Preview
// ======================================

function handleImagePreview(e){

const file =
e.target.files[0];

if(!file) return;

const url =
URL.createObjectURL(file);

const preview =
document.getElementById("preview");

preview.src = url;

preview.style.display = "block";

enableAnalyzeButtons();

}

document
.getElementById("imageInput")
.addEventListener(
"change",
handleImagePreview
);

// ======================================
// Enable Buttons
// ======================================

function enableAnalyzeButtons(){

document
.getElementById("ocrBtn")
.disabled = false;

document
.getElementById("aiBtn")
.disabled = false;

}

// ======================================
// Barcode
// ======================================

window.startBarcodeScanner =
async function(){

clearReader();

const scanner =
new Html5Qrcode("reader");

currentScanner = scanner;

scanner.start(

{
facingMode:"environment"
},

{
fps:10,
qrbox:{
width:250,
height:250
}
},

async(decodedText)=>{

await scanner.stop();

await scanner.clear();

clearReader();

document
.getElementById("searchInput")
.value = decodedText;

normalSearch();

}

).catch(err=>{

showError(
"カメラ起動失敗"
);

});

}

// ======================================
// OCR
// ======================================

window.readOCR =
async function(){

const file =
document.getElementById("imageInput")
.files[0];

if(!file){

alert("画像なし");

return;

}

showLoading(
"OCR解析中..."
);

try{

const result =
await Tesseract.recognize(
file,
"jpn+eng"
);

const text =
result.data.text;

document
.getElementById("searchInput")
.value = text;

showAI(text);

}catch(err){

showError(err.message);

}

}

// ======================================
// AI Analyze
// ======================================

window.analyzeImage =
async function(){

const file =
document.getElementById("imageInput")
.files[0];

if(!file){

alert("画像なし");

return;

}

showLoading(
"AI解析中..."
);

const reader =
new FileReader();

reader.onload =
async function(){

try{

const base64 =
reader.result
.split(",")[1];

const prompt = `

画像の商品を解析。

以下を出力。

・ブランド
・商品カテゴリ
・型番候補
・特徴
・価格帯
・検索向きワード

`;

const result =
await askGemini(
prompt,
base64,
file.type
);

showAI(result);

}catch(err){

showError(err.message);

}

};

reader.readAsDataURL(file);

}

// ======================================
// Save
// ======================================

window.saveHistory = function(){

const text =
document
.getElementById("result")
.innerText;

if(
text === "待機中..."
){

alert("保存内容なし");

return;

}

const history =
JSON.parse(
localStorage.getItem(
"fashion_history"
) || "[]"
);

history.unshift({

date:new Date()
.toLocaleString(),

text:text

});

localStorage.setItem(
"fashion_history",
JSON.stringify(history)
);

alert("保存完了");

loadHistory();

}

// ======================================
// Load History
// ======================================

window.loadHistory = function(){

const history =
JSON.parse(
localStorage.getItem(
"fashion_history"
) || "[]"
);

const area =
document.getElementById(
"historyArea"
);

if(!history.length){

area.innerHTML =
"履歴なし";

return;

}

area.innerHTML =
history.map(item=>`

<div class="history-item">

<b>${item.date}</b>

<p>
${item.text.substring(0,180)}
</p>

</div>

`).join("");

}

// ======================================
// Clear
// ======================================

window.clearAll =
async function(){

document
.getElementById("searchInput")
.value = "";

document
.getElementById("result")
.innerHTML = "待機中...";

document
.getElementById("result")
.className = "result good";

const preview =
document
.getElementById("preview");

preview.src = "";

preview.style.display =
"none";

document
.getElementById("ocrBtn")
.disabled = true;

document
.getElementById("aiBtn")
.disabled = true;

const input =
document
.getElementById("imageInput");

input.value = "";

clearReader();

if(currentScanner){

try{

await currentScanner.stop();
await currentScanner.clear();

}catch(e){}

currentScanner = null;

}

}

// ======================================
// Reader Clear
// ======================================

function clearReader(){

document
.getElementById("reader")
.innerHTML = "";

}

// ======================================
// UI
// ======================================

function showLoading(text){

const result =
document
.getElementById("result");

result.className =
"result good";

result.innerHTML = text;

}

function showError(text){

const result =
document
.getElementById("result");

result.className =
"result bad";

result.innerHTML = text;

}

function showAI(text){

const result =
document
.getElementById("result");

result.className =
"result ai";

result.innerHTML =
text.replace(/\n/g,"<br>");

}

function showResult(html){

const result =
document
.getElementById("result");

result.className =
"result good";

result.innerHTML = html;

}

// ======================================
// Init
// ======================================

loadHistory();

</script>

</body>
</html>
