<script>

const WORKER_URL =
"https://chanfana-openapi-template.big-light-0903.workers.dev";

let currentScanner = null;

// ======================================
// Gemini
// ======================================

async function askGemini(
prompt,
base64=null,
mimeType=null
){

const parts = [
{
text:prompt
}
];

if(base64){

parts.push({

inlineData:{
mimeType:mimeType,
data:base64
}

});

}

const response =
await fetch(
WORKER_URL,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[
{
parts:parts
}
],

generationConfig:{
temperature:0.6,
topP:0.9,
topK:32,
maxOutputTokens:2048
}

})

}
);

if(!response.ok){

throw new Error(
"Worker通信失敗"
);

}

const data =
await response.json();

if(data.error){

throw new Error(
data.error
);

}

const text =
data?.candidates?.[0]
?.content?.parts?.[0]
?.text;

if(!text){

throw new Error(
"Gemini応答なし"
);

}

return text;

}

// ======================================
// Compress
// ======================================

async function compressImage(file){

return new Promise((resolve)=>{

const img = new Image();

const reader = new FileReader();

reader.onload = e=>{

img.src = e.target.result;

};

img.onload = ()=>{

const canvas =
document.createElement("canvas");

const maxSize = 900;

let width = img.width;
let height = img.height;

if(width > height){

if(width > maxSize){

height *= maxSize / width;
width = maxSize;

}

}else{

if(height > maxSize){

width *= maxSize / height;
height = maxSize;

}

}

canvas.width = width;
canvas.height = height;

const ctx =
canvas.getContext("2d");

ctx.drawImage(
img,
0,
0,
width,
height
);

resolve(

canvas.toDataURL(
"image/jpeg",
0.55
)

);

};

reader.readAsDataURL(file);

});

}

// ======================================
// Search
// ======================================

window.normalSearch = function(){

const keyword =
document.getElementById("searchInput")
.value
.trim();

if(!keyword){

alert("検索ワード入力");

return;

}

const q =
encodeURIComponent(keyword);

showResult(`

<h2>${keyword}</h2>

<div class="link-grid">

<a
class="link-btn"
target="_blank"
href="https://www.google.com/search?q=site:zozo.jp+${q}">

Amazon検索
</a>

<a
class="link-btn"
target="_blank"
href="https://www.google.com/search?q=${q}">
Google検索
</a>

</div>

`);

}

// ======================================
// Camera
// ======================================

window.captureCamera = function(){

const input =
document.getElementById("imageInput");

input.value = "";

input.setAttribute(
"capture",
"environment"
);

input.accept = "image/*";

input.click();

}

// ======================================
// Pick Image
// ======================================

window.pickImage = function(){

const input =
document.getElementById("imageInput");

input.value = "";

input.removeAttribute("capture");

input.accept = "image/*";

input.click();

}

// ======================================
// Preview
// ======================================

async function handleImagePreview(e){

try{

const file =
e.target.files?.[0];

if(!file){

showError("画像取得失敗");

return;

}

const preview =
document.getElementById("preview");

preview.src =
URL.createObjectURL(file);

preview.style.display =
"block";

showLoading(
"画像読み込み完了"
);

}catch(err){

showError(
"画像表示失敗：" + err.message
);

}

}

document
.getElementById("imageInput")
.addEventListener(
"change",
handleImagePreview
);

// ======================================
// Barcode
// ======================================

window.startBarcodeScanner =
async function(){

try{

clearReader();

if(currentScanner){

try{

await currentScanner.stop();
await currentScanner.clear();

}catch(e){}

}

const scanner =
new Html5Qrcode("reader");

currentScanner = scanner;

await scanner.start(

{
facingMode:"environment"
},

{
fps:10,
qrbox:{
width:240,
height:240
}
},

async(decodedText)=>{

try{

await scanner.stop();
await scanner.clear();

}catch(e){}

clearReader();

document
.getElementById("searchInput")
.value = decodedText;

showLoading(
"バーコード取得完了"
);

normalSearch();

}

);

}catch(err){

showError(
"バーコード起動失敗"
);

}

}

// ======================================
// OCR
// ======================================

async function runOCR(lang){

const file =
document.getElementById("imageInput")
.files?.[0];

if(!file){

alert("画像なし");

return;

}

showLoading(

lang === "eng"

?

"型番OCR解析中..."

:

"日本語OCR解析中...\n初回は30秒〜1分かかる場合あり"

);

try{

const compressed =
await compressImage(file);

const worker =
await Tesseract.createWorker();

await worker.loadLanguage(lang);

await worker.initialize(lang);

const result =
await worker.recognize(
compressed
);

await worker.terminate();

const text =
result.data.text;

if(!text.trim()){

showError(
"OCR結果なし"
);

return;

}

document
.getElementById("searchInput")
.value = text;

showAI(text);

}catch(err){

showError(
"OCR失敗：" + err.message
);

}

}

window.readOCRFast =
async function(){

await runOCR("eng");

}

window.readOCRJapanese =
async function(){

await runOCR("jpn+eng");

}

// ======================================
// AI Analyze
// ======================================

window.analyzeImage =
async function(){

const file =
document.getElementById("imageInput")
.files?.[0];

if(!file){

alert("画像なし");

return;

}

showLoading(
"AI解析中..."
);

try{

const compressed =
await compressImage(file);

const base64 =
compressed.split(",")[1];

const prompt = `

あなたはファッション解析AI。

画像の商品を可能な限り分析。

以下を出力。

・ブランド候補
・アイテム種類
・型番候補
・年代感
・系統
・特徴
・価格帯
・検索向きワード
・似ているブランド

最後に：

【おすすめ検索ワード】

を必ず出力。

`;

const result =
await askGemini(
prompt,
base64,
"image/jpeg"
);

showAI(result);

}catch(err){

showError(
"AI解析失敗：" + err.message
);

console.error(err);

}

}

// ======================================
// Save
// ======================================

window.saveHistory = function(){

const text =
document
.getElementById("result")
.innerText;

if(
text === "待機中..."
){

alert("保存内容なし");

return;

}

const history =
JSON.parse(
localStorage.getItem(
"fashion_history"
) || "[]"
);

history.unshift({

date:new Date()
.toLocaleString(),

text:text

});

localStorage.setItem(
"fashion_history",
JSON.stringify(history)
);

alert("保存完了");

loadHistory();

}

// ======================================
// Load History
// ======================================

window.loadHistory = function(){

const history =
JSON.parse(
localStorage.getItem(
"fashion_history"
) || "[]"
);

const area =
document.getElementById(
"historyArea"
);

if(!history.length){

area.innerHTML =
"履歴なし";

return;

}

area.innerHTML =
history.map(item=>`

<div class="history-item">

<b>${item.date}</b>

<p>
${item.text.substring(0,180)}
</p>

</div>

`).join("");

}

// ======================================
// Clear History
// ======================================

window.clearHistory = function(){

localStorage.removeItem(
"fashion_history"
);

loadHistory();

alert("履歴削除完了");

}

// ======================================
// Clear
// ======================================

window.clearAll =
async function(){

document
.getElementById("searchInput")
.value = "";

document
.getElementById("result")
.innerHTML = "待機中...";

document
.getElementById("result")
.className = "result good";

const preview =
document.getElementById("preview");

preview.src = "";

preview.style.display = "none";

const input =
document.getElementById("imageInput");

input.value = "";

clearReader();

if(currentScanner){

try{

await currentScanner.stop();
await currentScanner.clear();

}catch(e){}

currentScanner = null;

}

showLoading("リセット完了");

setTimeout(()=>{

document
.getElementById("result")
.innerHTML = "待機中...";

},600);

}

// ======================================
// Reader
// ======================================

function clearReader(){

document
.getElementById("reader")
.innerHTML = "";

}

// ======================================
// UI
// ======================================

function showLoading(text){

const result =
document
.getElementById("result");

result.className =
"result good";

result.innerHTML = text;

}

function showError(text){

const result =
document
.getElementById("result");

result.className =
"result bad";

result.innerHTML = text;

}

function showAI(text){

const result =
document
.getElementById("result");

result.className =
"result ai";

result.innerHTML =
text.replace(/\n/g,"<br>");

}

function showResult(html){

const result =
document
.getElementById("result");

result.className =
"result good";

result.innerHTML = html;

}

// ======================================
// Init
// ======================================

loadHistory();

</script>
